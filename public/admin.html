<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Viewer — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #2c2c2c;
      color: #e0d6c8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .admin-panel {
      width: 100%;
      max-width: 500px;
      padding: 40px;
    }

    h1 {
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 1px;
      margin-bottom: 32px;
      text-align: center;
    }

    .field {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #8a7a62;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid #5a4e3e;
      border-radius: 8px;
      color: #e0d6c8;
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #c4a96a;
    }

    .file-field {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .file-field input[type="file"] {
      display: none;
    }

    .file-btn {
      background: #5a4e3e;
      color: #e0d6c8;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .file-btn:hover {
      background: #6d5e4a;
    }

    .file-name {
      font-size: 13px;
      color: #8a7a62;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-img {
      max-width: 100px;
      max-height: 140px;
      border-radius: 4px;
      border: 1px solid #5a4e3e;
      margin-top: 8px;
    }

    #submit-btn {
      width: 100%;
      padding: 14px;
      background: #6b1414;
      color: #c4a96a;
      border: 1px solid rgba(196, 169, 106, 0.3);
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    #submit-btn:hover {
      background: #7a1818;
    }

    #submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .status-error { color: #d44; }
    .status-success { color: #4a4; }
    .status-loading { color: #c4a96a; }

    .current-book {
      margin-bottom: 32px;
      padding: 16px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      border: 1px solid #5a4e3e;
    }

    .current-book h3 {
      font-size: 14px;
      font-weight: 400;
      color: #8a7a62;
      margin-bottom: 8px;
    }

    .current-book p {
      font-size: 13px;
      color: #e0d6c8;
    }

    .current-book a {
      color: #c4a96a;
      text-decoration: none;
    }

    .current-book a:hover {
      text-decoration: underline;
    }

    .format-note {
      font-size: 12px;
      color: #6a5e4e;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="admin-panel">
    <h1>Book Viewer Admin</h1>

    <div id="current-book" class="current-book" style="display:none">
      <h3>Currently uploaded</h3>
      <p id="current-info"></p>
    </div>

    <div class="field">
      <label>Admin Password</label>
      <input type="password" id="password" placeholder="Enter admin password" />
    </div>

    <div class="field">
      <label>Book Title</label>
      <input type="text" id="title" placeholder="e.g. The Black Orchid" />
    </div>

    <div class="field">
      <label>Cover Image (optional)</label>
      <div class="file-field">
        <button class="file-btn" id="cover-btn">Choose Image</button>
        <span class="file-name" id="cover-name">No file chosen</span>
        <input type="file" id="cover-input" accept="image/*" />
      </div>
      <img id="cover-preview" class="preview-img" style="display:none" />
    </div>

    <div class="field">
      <label>Book File</label>
      <div class="file-field">
        <button class="file-btn" id="doc-btn">Choose File</button>
        <span class="file-name" id="doc-name">No file chosen</span>
        <input type="file" id="doc-input" accept=".epub,.pdf" />
      </div>
      <p class="format-note">EPUB = resizable text with font controls. PDF = fixed image pages.</p>
    </div>

    <button id="submit-btn">Upload Book</button>
    <div id="status"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const coverInput = document.getElementById('cover-input');
    const docInput = document.getElementById('doc-input');
    const coverPreview = document.getElementById('cover-preview');
    const status = document.getElementById('status');

    // Check current book
    fetch('/api/book')
      .then(r => r.json())
      .then(data => {
        if (data.exists) {
          document.getElementById('current-book').style.display = 'block';
          document.getElementById('current-info').innerHTML =
            `<strong>${data.title}</strong><br>` +
            `Format: ${data.format || 'pdf'}<br>` +
            `Uploaded: ${new Date(data.uploadedAt).toLocaleDateString()}<br>` +
            `<a href="/" target="_blank">View book</a>`;
          document.getElementById('title').value = data.title;
        }
      })
      .catch(() => {});

    document.getElementById('cover-btn').addEventListener('click', () => coverInput.click());
    document.getElementById('doc-btn').addEventListener('click', () => docInput.click());

    coverInput.addEventListener('change', () => {
      if (coverInput.files[0]) {
        document.getElementById('cover-name').textContent = coverInput.files[0].name;
        const reader = new FileReader();
        reader.onload = (e) => {
          coverPreview.src = e.target.result;
          coverPreview.style.display = 'block';
        };
        reader.readAsDataURL(coverInput.files[0]);
      }
    });

    docInput.addEventListener('change', () => {
      if (docInput.files[0]) {
        document.getElementById('doc-name').textContent = docInput.files[0].name;
      }
    });

    // Upload raw data to our API
    async function uploadFile(filename, data, password, contentType) {
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: {
          'X-Admin-Password': password,
          'X-File-Name': filename,
          'X-Content-Type': contentType || 'application/octet-stream',
        },
        body: data,
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Upload failed' }));
        throw new Error(err.error || 'Upload failed');
      }

      return await res.json();
    }

    // ── PDF processing ──
    async function renderPDFPages(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const pages = [];
      const scale = 2;

      for (let i = 1; i <= pdf.numPages; i++) {
        showStatus(`Rendering page ${i} of ${pdf.numPages}...`, 'loading');
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale });

        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');

        await page.render({ canvasContext: ctx, viewport }).promise;

        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.90));
        pages.push(blob);
      }

      return pages;
    }

    // ── EPUB processing ──
    async function parseEPUB(file, password) {
      showStatus('Parsing EPUB...', 'loading');
      const zip = await JSZip.loadAsync(file);

      // Find the container.xml to locate content.opf
      const containerXml = await zip.file('META-INF/container.xml').async('string');
      const containerDoc = new DOMParser().parseFromString(containerXml, 'application/xml');
      const opfPath = containerDoc.querySelector('rootfile').getAttribute('full-path');
      const opfDir = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);

      // Parse content.opf
      const opfXml = await zip.file(opfPath).async('string');
      const opfDoc = new DOMParser().parseFromString(opfXml, 'application/xml');

      // Get spine order (reading order)
      const spineItems = opfDoc.querySelectorAll('spine itemref');
      const manifest = opfDoc.querySelectorAll('manifest item');

      // Build manifest map: id -> {href, mediaType}
      const manifestMap = {};
      manifest.forEach(item => {
        manifestMap[item.getAttribute('id')] = {
          href: item.getAttribute('href'),
          mediaType: item.getAttribute('media-type'),
        };
      });

      // Extract and upload all images from the EPUB
      // Map: original relative path -> uploaded Blob URL
      const imageUrlMap = {};
      showStatus('Extracting images...', 'loading');

      let imageCount = 0;
      for (const [id, info] of Object.entries(manifestMap)) {
        if (!info.mediaType || !info.mediaType.startsWith('image/')) continue;

        const imagePath = opfDir + info.href;
        const imageFile = zip.file(imagePath);
        if (!imageFile) continue;

        imageCount++;
        showStatus(`Uploading image ${imageCount}...`, 'loading');

        const imageData = await imageFile.async('blob');
        const ext = info.href.split('.').pop() || 'png';
        const filename = `img-${String(imageCount).padStart(3, '0')}.${ext}`;

        const result = await uploadFile(filename, imageData, password, info.mediaType);

        // Map all possible ways the image might be referenced
        imageUrlMap[info.href] = result.url;
        imageUrlMap['../' + info.href] = result.url;
        // Also map just the filename
        const basename = info.href.split('/').pop();
        imageUrlMap[basename] = result.url;
        imageUrlMap['../images/' + basename] = result.url;
        imageUrlMap['images/' + basename] = result.url;
      }

      // Extract chapters in spine order
      const chapters = [];
      showStatus('Processing chapters...', 'loading');

      for (const itemRef of spineItems) {
        const idref = itemRef.getAttribute('idref');
        const info = manifestMap[idref];
        if (!info) continue;

        const filePath = opfDir + info.href;
        const zipFile = zip.file(filePath);
        if (!zipFile) continue;

        const html = await zipFile.async('string');

        // Parse the XHTML and extract body content
        const doc = new DOMParser().parseFromString(html, 'application/xhtml+xml');
        const body = doc.querySelector('body');
        if (!body || !body.innerHTML.trim()) continue;

        // Rewrite image src attributes to point to uploaded Blob URLs
        // Also strip inline width/height so our CSS can control sizing
        const images = body.querySelectorAll('img');
        images.forEach(img => {
          const src = img.getAttribute('src');
          if (src && imageUrlMap[src]) {
            img.setAttribute('src', imageUrlMap[src]);
          } else if (src) {
            const fname = src.split('/').pop();
            for (const [key, url] of Object.entries(imageUrlMap)) {
              if (key.endsWith(fname)) {
                img.setAttribute('src', url);
                break;
              }
            }
          }
          // Remove inline sizing so CSS controls the display
          img.removeAttribute('width');
          img.removeAttribute('height');
          img.style.removeProperty('width');
          img.style.removeProperty('height');
        });

        // Also clean up parent divs with inline styles that constrain image size
        body.querySelectorAll('div[style]').forEach(div => {
          if (div.querySelector('img')) {
            // Keep text-align but remove width constraints
            const align = div.style.textAlign;
            div.removeAttribute('style');
            if (align) div.style.textAlign = align;
            div.style.margin = '0.8em 0';
          }
        });

        // Format chapter titles: split "Chapter X: Title" into two centered lines
        const heading = body.querySelector('h1, h2, h3');
        let chapterTitle = '';
        if (heading) {
          const text = heading.textContent.trim();
          chapterTitle = text;
          // Match patterns like "Chapter One: The Title" or "Chapter 1: The Title"
          const match = text.match(/^(Chapter\s+\S+)\s*[:—–-]\s*(.+)$/i);
          if (match) {
            heading.innerHTML = match[1] + '<br/>' + match[2];
          }
          heading.style.textAlign = 'center';
        }

        chapters.push({
          title: chapterTitle,
          html: body.innerHTML,
        });
      }

      return chapters;
    }

    // ── Upload handler ──
    document.getElementById('submit-btn').addEventListener('click', async () => {
      const password = document.getElementById('password').value;
      const title = document.getElementById('title').value.trim();
      const docFile = docInput.files[0];
      const coverFile = coverInput.files[0] || null;

      if (!password) return showStatus('Enter the admin password', 'error');
      if (!title) return showStatus('Enter a book title', 'error');
      if (!docFile) return showStatus('Choose a book file', 'error');

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;

      const isEpub = docFile.name.toLowerCase().endsWith('.epub');

      try {
        let coverUrl = null;

        // Upload cover if provided
        if (coverFile) {
          showStatus('Uploading cover...', 'loading');
          const coverResult = await uploadFile('cover-' + coverFile.name, coverFile, password, coverFile.type);
          coverUrl = coverResult.url;
        }

        if (isEpub) {
          // ── EPUB flow ──
          const chapters = await parseEPUB(docFile, password);

          if (chapters.length === 0) {
            showStatus('No chapters found in EPUB', 'error');
            btn.disabled = false;
            return;
          }

          // Upload chapter data as a single JSON blob
          showStatus('Uploading chapters...', 'loading');
          const chaptersJson = JSON.stringify(chapters);
          const chaptersBlob = new Blob([chaptersJson], { type: 'application/json' });
          const chaptersResult = await uploadFile('chapters.json', chaptersBlob, password, 'application/json');

          // Save metadata
          showStatus('Saving...', 'loading');
          const metaRes = await fetch('/api/save-meta', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Admin-Password': password,
            },
            body: JSON.stringify({
              title,
              format: 'epub',
              chaptersUrl: chaptersResult.url,
              chapterCount: chapters.length,
              coverUrl,
            }),
          });

          const metaData = await metaRes.json();
          if (!metaRes.ok) {
            showStatus(metaData.error || 'Failed to save metadata', 'error');
          } else {
            showStatus(`Book uploaded! ${chapters.length} chapters. View it at /`, 'success');
          }

        } else {
          // ── PDF flow ──
          const pageBlobs = await renderPDFPages(docFile);

          const pageUrls = [];
          for (let i = 0; i < pageBlobs.length; i++) {
            showStatus(`Uploading page ${i + 1} of ${pageBlobs.length}...`, 'loading');
            const result = await uploadFile(`page-${String(i + 1).padStart(4, '0')}.jpg`, pageBlobs[i], password, 'image/jpeg');
            pageUrls.push(result.url);
          }

          showStatus('Saving...', 'loading');
          const metaRes = await fetch('/api/save-meta', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Admin-Password': password,
            },
            body: JSON.stringify({
              title,
              format: 'pdf',
              pageUrls,
              coverUrl,
            }),
          });

          const metaData = await metaRes.json();
          if (!metaRes.ok) {
            showStatus(metaData.error || 'Failed to save metadata', 'error');
          } else {
            showStatus(`Book uploaded! ${pageUrls.length} pages. View it at /`, 'success');
          }
        }
      } catch (err) {
        showStatus('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    });

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status-' + type;
    }
  </script>
</body>
</html>
